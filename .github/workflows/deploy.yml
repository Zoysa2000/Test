name: Build and Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/test-backend:${{ env.IMAGE_TAG }} .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/test-backend:${{ env.IMAGE_TAG }}

      - name: Update Kubernetes manifest image
        run: |
          sed -i "s|image: .*test-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/test-backend:${{ env.IMAGE_TAG }}|g" k8/deployment.yml

      - name: Commit and push manifest change
        run: |
          git config user.name "thilina-dev"
          git config user.email "thilinadezpysa2000@gmail.com"
          git add k8/deployment.yaml
          git commit -m "Update test-backend image to ${{ env.IMAGE_TAG }}" || echo "No changes to commit"
          git push